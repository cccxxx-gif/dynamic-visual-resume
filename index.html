<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的动态简历 · Xi · 2026</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #15100b;
}

#scene-frame {
  position: fixed; inset: 0;
  width: 100vw; height: 100vh;
  border: none;
  z-index: 10;
  background: #15100b;
  opacity: 0;
  transition: opacity 0.40s ease;
}
#scene-frame.show {
  opacity: 1;
}

#nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  background: linear-gradient(to top, rgba(21,16,11,0.94) 0%, rgba(21,16,11,0.55) 65%, transparent 100%);
  padding: 8px 24px 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
}
#nav-bar.visible { opacity: 1; pointer-events: auto; }

#nav-bar button {
  font-family: "JetBrains Mono", "Noto Sans SC", ui-monospace, monospace;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: #8B7E70;
  background: rgba(36,29,24,0.50);
  border: 1px solid rgba(179,106,76,0.38);
  border-radius: 6px;
  padding: 8px 22px;
  cursor: pointer;
  transition: all 0.25s ease;
  user-select: none;
  -webkit-user-select: none;
  white-space: nowrap;
}
#nav-bar button:hover {
  color: #B36A4C;
  border-color: #B36A4C;
  background: rgba(36,29,24,0.68);
}
#nav-bar button:active { transform: scale(0.96); }

#nav-bar .scene-indicator {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: rgba(139,126,112,0.55);
  min-width: 70px;
  text-align: center;
  user-select: none;
}

#enter-hint {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9998;
  font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  letter-spacing: 0.12em;
  color: rgba(179,106,76,0.72);
  cursor: pointer;
  padding: 10px 28px;
  border: 1px solid rgba(179,106,76,0.32);
  border-radius: 24px;
  background: rgba(21,16,11,0.58);
  transition: all 0.35s ease;
  user-select: none;
  -webkit-user-select: none;
  opacity: 0;
  animation: hintIn 0.8s ease-out 3.5s forwards;
}
#enter-hint:hover {
  color: #B36A4C;
  border-color: #B36A4C;
  background: rgba(36,29,24,0.72);
}
@keyframes hintIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

</style>
</head>
<body>

<iframe id="scene-frame"></iframe>

<nav id="nav-bar">
  <button id="btn-prev">◀ 上一页</button>
  <span class="scene-indicator" id="scene-ind">1 / 5</span>
  <button id="btn-next">下一页 ▶</button>
</nav>

<div id="enter-hint">进入项目 ↓</div>

<script>
(function() {
  var currentScene = 0;
  var TOTAL_SCENES = 5;
  var isSwitching = false;

  var sceneSrc = {
    0: "scenes/cover.html",
    1: "scenes/project1.html",
    2: "scenes/project2.html",
    3: "scenes/project3.html",
    4: "scenes/project4.html"
  };

  var names = [
    '封面',
    '项目 1 · 客服管理',
    '项目 2 · AI 提效',
    '项目 3 · 飞书协作',
    '项目 4 · 中台 MVP'
  ];

  function switchTo(target) {
    if (isSwitching) return;
    if (target === currentScene) return;
    if (target < 0 || target >= TOTAL_SCENES) return;
    isSwitching = true;

    var frame = document.getElementById('scene-frame');
    var oldScene = currentScene;
    currentScene = target;

    // Fade out
    frame.classList.remove('show');

    setTimeout(function() {
      // Switch src — cover uses cache-busting for reliable replay
      var src = sceneSrc[target];
      if (target === 0) {
        src = src + '?r=' + Date.now();
      }
      frame.src = src;

      // Wait for load, then fade in
      var onLoad = function() {
        frame.removeEventListener('load', onLoad);
        frame.classList.add('show');
        updateNav();
        isSwitching = false;
      };
      frame.addEventListener('load', onLoad);
      // Fallback: fade in after timeout even if load event fires slowly
      setTimeout(function() {
        if (isSwitching) {
          frame.classList.add('show');
          updateNav();
          isSwitching = false;
        }
      }, 1500);
    }, 420);

    updateNav();
  }

  function goNext() {
    if (currentScene < TOTAL_SCENES - 1) switchTo(currentScene + 1);
    else switchTo(0);
  }

  function goPrev() {
    if (currentScene > 0) switchTo(currentScene - 1);
    else switchTo(TOTAL_SCENES - 1);
  }

  function updateNav() {
    var nav = document.getElementById('nav-bar');
    var hint = document.getElementById('enter-hint');
    var prevBtn = document.getElementById('btn-prev');
    var nextBtn = document.getElementById('btn-next');
    var ind = document.getElementById('scene-ind');

    if (currentScene === 0) {
      nav.classList.remove('visible');
      if (hint) hint.style.display = '';
    } else {
      nav.classList.add('visible');
      if (hint) hint.style.display = 'none';
    }

    if (ind) ind.textContent = (currentScene + 1) + ' / ' + TOTAL_SCENES;

    if (currentScene === 0) {
      if (prevBtn) prevBtn.textContent = '◀ 封面';
      if (nextBtn) nextBtn.textContent = '进入项目 ▶';
    } else if (currentScene === TOTAL_SCENES - 1) {
      if (prevBtn) prevBtn.textContent = '◀ ' + names[currentScene - 1];
      if (nextBtn) nextBtn.textContent = '◀ 返回封面';
    } else {
      if (prevBtn) {
        if (currentScene === 1) prevBtn.textContent = '◀ 封面';
        else prevBtn.textContent = '◀ ' + names[currentScene - 1];
      }
      if (nextBtn) nextBtn.textContent = names[currentScene + 1] + ' ▶';
    }
  }

  // Event handlers
  document.getElementById('btn-prev').addEventListener('click', goPrev);
  document.getElementById('btn-next').addEventListener('click', goNext);
  document.getElementById('enter-hint').addEventListener('click', function() { switchTo(1); });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault(); goNext();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault(); goPrev();
    } else if (e.key === 'Home') {
      e.preventDefault(); switchTo(0);
    } else if (e.key === 'End') {
      e.preventDefault(); switchTo(TOTAL_SCENES - 1);
    }
  });

  // Touch swipe
  var touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
      if (dx < -40) goNext();
      else if (dx > 40) goPrev();
    }
  });

  // Wheel
  var wheelTimer = 0;
  document.addEventListener('wheel', function(e) {
    var now = Date.now();
    if (now - wheelTimer < 800) return;
    if (Math.abs(e.deltaY) < 50) return;
    wheelTimer = now;
    if (e.deltaY > 0) goNext();
    else goPrev();
  }, { passive: true });

  // Init
  var frame = document.getElementById('scene-frame');
  frame.src = sceneSrc[0];
  frame.addEventListener('load', function() {
    frame.classList.add('show');
  });
  // Fallback show
  setTimeout(function() {
    if (!frame.classList.contains('show')) frame.classList.add('show');
  }, 2000);
  updateNav();

  window.switchTo = switchTo;
  window.goNext = goNext;
  window.goPrev = goPrev;
})();
</script>

</body>
</html>
